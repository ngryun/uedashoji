<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>요나고미나미고등학교 설악고등학교 2026 국제교류</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #14161a; }
  body { font-family: "Helvetica Neue", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; touch-action: none; }
  [hidden] { display: none !important; }
  .srOnly { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
  button:focus-visible { outline: 3px solid #8ecbff; outline-offset: 3px; }

  /* ── 시작 화면 ─────────────────────────── */
  #start {
    position: fixed; inset: 0; z-index: 50;
    background: linear-gradient(160deg, #1c1f24 0%, #2b3038 60%, #3a414b 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #e8e6e1; text-align: center; padding: 24px; gap: 10px;
    transition: opacity .6s ease;
  }
  #start.hidden { opacity: 0; pointer-events: none; }
  #start .jp {
    max-width: 960px; font-size: clamp(20px, 4vw, 36px); line-height: 1.45;
    letter-spacing: .12em; text-wrap: balance; word-break: keep-all; font-weight: 300;
  }
  #start .ko { font-size: clamp(13px, 3vw, 17px); letter-spacing: .18em; color: #b9b5ac; margin-bottom: 6px; }
  #start .line { width: 56px; height: 1px; background: #8b867c; margin: 10px 0 16px; }
  #start .help {
    font-size: clamp(11px, 2.6vw, 13.5px); line-height: 2; color: #a7a49d;
    background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.09);
    padding: 14px 26px; border-radius: 10px;
  }
  #start .help b { color: #e8e6e1; font-weight: 600; }
  #startActions { margin-top: 26px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
  #enterBtn, #galleryBtn {
    padding: 14px 38px; font-size: 14px; letter-spacing: .18em; text-indent: .18em;
    color: #14161a; background: #e8e6e1; border: none; border-radius: 999px; cursor: pointer;
    transition: transform .15s ease, background .15s ease;
  }
  #galleryBtn { color: #e8e6e1; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.28); }
  #enterBtn:hover, #galleryBtn:hover { background: #fff; color: #14161a; transform: translateY(-1px); }
  #enterBtn:disabled, #galleryBtn:disabled { opacity: .4; cursor: wait; }
  #loadNote { font-size: 11px; color: #aaa69d; margin-top: 14px; letter-spacing: .1em; }

  /* ── HUD ──────────────────────────────── */
  #crosshair {
    position: fixed; left: 50%; top: 50%; z-index: 10; width: 6px; height: 6px;
    transform: translate(-50%,-50%); border-radius: 50%;
    background: rgba(255,255,255,.75); box-shadow: 0 0 4px rgba(0,0,0,.5);
    display: none; pointer-events: none;
  }
  #roomLabel {
    position: fixed; top: calc(14px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
    z-index: 10; color: rgba(255,255,255,.9); font-size: 12.5px; letter-spacing: .25em; text-indent: .25em;
    background: rgba(20,22,26,.45); backdrop-filter: blur(6px);
    padding: 7px 20px; border-radius: 999px; display: none; pointer-events: none;
    white-space: nowrap; transition: opacity .4s;
  }
  #hint {
    position: fixed; bottom: calc(16px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
    z-index: 10; color: rgba(255,255,255,.55); font-size: 11px; letter-spacing: .12em;
    display: none; pointer-events: none; white-space: nowrap;
  }

  /* ── 사진 확대 오버레이 ─────────────────── */
  #viewer {
    position: fixed; inset: 0; z-index: 60; background: rgba(10,11,13,.92);
    display: none; align-items: center; justify-content: center; flex-direction: column; gap: 14px;
    padding: 3vh 3vw;
  }
  #viewer.show { display: flex; }
  #viewer img, #viewer video {
    max-width: 94vw; max-height: 84vh; object-fit: contain;
    box-shadow: 0 20px 80px rgba(0,0,0,.7); border: 6px solid #f2f0eb; background: #222;
  }
  #viewerCap { color: #b9b5ac; font-size: 12px; letter-spacing: .2em; }
  #viewerClose {
    position: absolute; top: calc(14px + env(safe-area-inset-top)); right: 18px;
    width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(255,255,255,.25);
    background: rgba(255,255,255,.08); color: #fff; font-size: 20px; cursor: pointer;
  }

  /* ── 접근 가능한 2D 목록 ─────────────────── */
  #galleryPanel {
    position: fixed; inset: 0; z-index: 55; overflow-y: auto; touch-action: pan-y;
    color: #e8e6e1; background: #16191e; padding: 0 18px 36px;
  }
  .galleryHeader {
    position: sticky; top: 0; z-index: 2; display: flex; align-items: center; justify-content: space-between;
    padding: calc(16px + env(safe-area-inset-top)) 0 14px; background: rgba(22,25,30,.94); backdrop-filter: blur(10px);
  }
  .galleryHeader h2 { font-size: 19px; font-weight: 500; letter-spacing: .12em; }
  .iconButton {
    width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(255,255,255,.28);
    background: rgba(255,255,255,.08); color: #fff; font-size: 18px; cursor: pointer;
  }
  #galleryFilters { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0 18px; }
  #galleryFilters button {
    flex: 0 0 auto; padding: 9px 14px; border-radius: 999px; border: 1px solid #555b65;
    color: #d9d7d1; background: #242931; cursor: pointer;
  }
  #galleryFilters button[aria-pressed="true"] { color: #17191d; background: #f0eee9; border-color: #f0eee9; }
  #galleryGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; max-width: 1200px; margin: 0 auto; }
  .galleryCard {
    min-width: 0; border: 1px solid #3d424b; border-radius: 10px; overflow: hidden; cursor: pointer;
    color: #d7d4cd; background: #23272e; text-align: left;
  }
  .galleryCard img { display: block; width: 100%; aspect-ratio: 4 / 3; object-fit: cover; background: #30353d; }
  .galleryCardMeta { display: flex; justify-content: space-between; gap: 8px; padding: 9px 10px; font-size: 11px; letter-spacing: .08em; }
  .galleryCardType { color: #9fcfff; }

  /* ── 모바일 컨트롤 ─────────────────────── */
  #touchUI { position: fixed; inset: 0; z-index: 20; display: none; pointer-events: none; touch-action: none; }
  body.touch.playing #touchUI { display: block; }
  #joyBase {
    position: absolute; width: 118px; height: 118px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,.30); background: rgba(255,255,255,.07);
    left: 34px; bottom: calc(40px + env(safe-area-inset-bottom));
    display: none;
  }
  #joyStick {
    position: absolute; width: 52px; height: 52px; border-radius: 50%;
    background: rgba(255,255,255,.45); left: 33px; top: 33px;
  }
  .tbtn {
    position: absolute; border-radius: 50%; pointer-events: auto;
    border: 2px solid rgba(255,255,255,.30); background: rgba(255,255,255,.10);
    color: rgba(255,255,255,.85); font-size: 11px; letter-spacing: .08em; font-weight: 600;
    display: flex; align-items: center; justify-content: center; user-select: none; -webkit-user-select: none;
    appearance: none;
  }
  #btnJump { width: 74px; height: 74px; right: 30px; bottom: calc(46px + env(safe-area-inset-bottom)); }
  #btnRun  { width: 58px; height: 58px; right: 118px; bottom: calc(36px + env(safe-area-inset-bottom)); }
  #btnRun.on { background: rgba(120,190,255,.35); border-color: rgba(160,210,255,.8); }
  .tbtn:active { background: rgba(255,255,255,.28); }

  @media (max-width: 520px) {
    #startActions { flex-direction: column; width: min(280px, 90vw); }
    #enterBtn, #galleryBtn { width: 100%; }
    #galleryGrid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { scroll-behavior: auto !important; transition-duration: .01ms !important; }
  }
</style>
</head>
<body>
<div id="app"></div>

<main id="start" aria-labelledby="museumTitle">
  <h1 class="jp" id="museumTitle">요나고미나미고등학교 설악고등학교 2026 국제교류</h1>
  <p class="ko">우에다 쇼지 사진미술관 콘셉트 · 2026. 7. 12 – 15</p>
  <div class="line"></div>
  <div class="help" id="helpDesktop">
    <b>W A S D</b> · 이동 &nbsp;&nbsp; <b>마우스</b> · 시점 &nbsp;&nbsp; <b>SHIFT</b> · 달리기<br>
    <b>SPACE</b> · 점프 &nbsp;&nbsp; <b>클릭</b> · 사진 감상 &nbsp;&nbsp; <b>ESC</b> · 마우스 해제
  </div>
  <div class="help" id="helpTouch" style="display:none">
    <b>왼쪽 조이스틱</b> · 이동 &nbsp;&nbsp; <b>오른쪽 드래그</b> · 시점<br>
    <b>JUMP</b> · 점프 &nbsp;&nbsp; <b>RUN</b> · 달리기 &nbsp;&nbsp; <b>사진 탭</b> · 감상
  </div>
  <div id="startActions">
    <button id="enterBtn" type="button" disabled>3D 입장</button>
    <button id="galleryBtn" type="button" disabled>2D 사진 목록</button>
  </div>
  <div id="loadNote" role="status" aria-live="polite">미술관을 준비하는 중…</div>
</main>

<div id="crosshair" aria-hidden="true"></div>
<div id="roomLabel" aria-live="polite"></div>
<div id="hint" aria-live="polite"></div>

<div id="viewer" role="dialog" aria-modal="true" aria-labelledby="viewerCap" aria-hidden="true" tabindex="-1">
  <button id="viewerClose" type="button" aria-label="확대 보기 닫기">✕</button>
  <div id="viewerBody"></div>
  <div id="viewerCap"></div>
</div>

<section id="galleryPanel" role="dialog" aria-modal="true" aria-labelledby="galleryTitle" aria-hidden="true" hidden>
  <header class="galleryHeader">
    <h2 id="galleryTitle">2026 국제교류 사진 목록</h2>
    <button id="galleryClose" class="iconButton" type="button" aria-label="2D 사진 목록 닫기">✕</button>
  </header>
  <nav id="galleryFilters" aria-label="날짜별 작품 필터"></nav>
  <div id="galleryGrid" role="list"></div>
</section>

<div id="touchUI" aria-hidden="true">
  <div id="joyBase" aria-hidden="true"><div id="joyStick"></div></div>
  <button class="tbtn" id="btnRun" type="button" aria-label="달리기 전환" aria-pressed="false" disabled>RUN</button>
  <button class="tbtn" id="btnJump" type="button" aria-label="점프" disabled>JUMP</button>
</div>

<script type="importmap">
{ "imports": { "three": "./lib/three.module.js" } }
</script>
<script type="module" src="./main.js"></script>
</body>
</html>
